services:
  - type: web
    name: aidevo-recommendation-service
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: aidevo
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
